version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: trustmeds-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: trustmeds
    volumes:
      - mongodb_data:/data/db
    networks:
      - trustmeds-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: trustmeds-backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/trustmeds?authSource=admin
      JWT_SECRET: your_super_secret_key_change_in_production
      NODE_ENV: development
      PORT: 5000
    depends_on:
      - mongodb
    volumes:
      - ../backend:/app
      - /app/node_modules
    networks:
      - trustmeds-network
    command: npm run dev

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: trustmeds-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:5000/api
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    networks:
      - trustmeds-network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  trustmeds-network:
    driver: bridge
