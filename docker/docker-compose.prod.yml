version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: trustmeds-mongodb-prod
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: trustmeds
    volumes:
      - mongodb_prod_data:/data/db
    restart: always
    networks:
      - trustmeds-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/admin --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: trustmeds-backend-prod
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/trustmeds?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 5000
    depends_on:
      mongodb:
        condition: service_healthy
    restart: always
    networks:
      - trustmeds-network
    healthcheck:
      test: curl --fail http://localhost:5000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: trustmeds-frontend-prod
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend
    networks:
      - trustmeds-network

volumes:
  mongodb_prod_data:

networks:
  trustmeds-network:
    driver: bridge
